<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookFiles Store{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-200 shadow-xs px-6 py-4 flex justify-between items-center">
        <a href="#" class="text-xl font-bold tracking-tight text-blue-600">BookFiles</a>
        
        <div class="flex items-center gap-6">
            {% if user.is_authenticated %}
                <span class="text-sm text-gray-600">Hello, <strong>{{ user.email }}</strong></span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium text-red-600 hover:underline cursor-pointer">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="text-sm font-medium text-gray-700 hover:text-blue-600">Login</a>
                <a href="{% url 'signup' %}" class="bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-md hover:bg-blue-700 transition">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        &copy; 2026 BookFiles E-commerce. All rights reserved.
    </footer>

</body>
</html>
