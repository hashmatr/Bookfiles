<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookFiles Store{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-white border-b border-gray-200 shadow-xs px-6 py-4 flex justify-between items-center">
<a href="{% url 'store:home' %}" class="text-xl font-bold tracking-tight text-blue-600">BookFiles</a>
        <div class="flex items-center gap-6">
            <a href="#" class="relative text-gray-700 hover:text-blue-600 flex items-center transition mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                </svg>
                <span class="absolute -top-2 -right-3 bg-blue-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center shadow-xs">
                    {{ cart|length }}
                </span>
            </a>

            {% if user.is_authenticated %}
                <span class="text-sm text-gray-600">Hello, <strong>{{ user.email }}</strong></span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium text-red-600 hover:underline cursor-pointer">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="text-sm font-medium text-gray-700 hover:text-blue-600">Login</a>
                <a href="{% url 'signup' %}" class="bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-md hover:bg-blue-700 transition">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        &copy; 2026 BookFiles E-commerce. All rights reserved.
    </footer>

</body>
</html>
