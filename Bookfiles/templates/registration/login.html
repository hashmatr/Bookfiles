{% extends 'base.html' %}

{% block title %}Login - BookFiles{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white border border-gray-200 p-8 rounded-lg shadow-sm mt-12">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Welcome Back</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2 rounded-md hover:bg-blue-700 transition cursor-pointer mt-2">
            Log In
        </button>
    </form>
    
    <p class="mt-4 text-sm text-gray-600 text-center">
        Don't have an account? <a href="{% url 'signup' %}" class="text-blue-600 hover:underline">Sign up here</a>
    </p>
</div>
{% endblock %}
